<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Encaissement">
  <meta name="theme-color" content="#0a0a0a">
  <title>Encaissement — L'Académie</title>
  <link rel="manifest" href="/manifest-encaissement.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #222;
      --border: #2e2e2e;
      --rose: #c44d56;
      --rose-dim: rgba(196,77,86,0.15);
      --gold: #c9a96e;
      --gold-dim: rgba(201,169,110,0.15);
      --green: #4ade80;
      --green-dim: rgba(74,222,128,0.12);
      --amber: #f59e0b;
      --amber-dim: rgba(245,158,11,0.12);
      --red: #f87171;
      --red-dim: rgba(248,113,113,0.12);
      --text: #f0ece6;
      --muted: #777;
      --muted2: #444;
      --ink: #0a0a0a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      touch-action: manipulation;
    }

    h1, h2, h3, h4 { font-family: 'Syne', sans-serif; }

    /* ── App Shell ── */
    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      padding: 16px 20px 12px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 14px;
      min-height: 64px;
    }

    .back-btn {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .back-btn:active { background: var(--surface2); }
    .back-btn svg { width: 22px; height: 22px; }

    .header-title {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .header-title .sub {
      display: block;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 400;
      color: var(--muted);
      margin-top: 2px;
    }

    .encaissement-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 10px;
      background: var(--surface);
      border: 1.5px solid var(--gold);
      color: var(--gold);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.01em;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .encaissement-badge svg { width: 18px; height: 18px; }

    /* ── Step indicator ── */
    .steps {
      display: flex;
      gap: 8px;
      padding: 10px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .step-dot {
      flex: 1;
      height: 3px;
      border-radius: 3px;
      background: var(--border);
      transition: background 0.3s;
    }
    .step-dot.active { background: var(--gold); }
    .step-dot.done { background: var(--green); }

    /* ── Body ── */
    .body {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    /* ── Screens ── */
    .screen { display: none; height: 100%; }
    .screen.active { display: flex; flex-direction: column; }

    /* ─────────────────────────────────────
       SCREEN 1 — Login
    ───────────────────────────────────── */
    .login-screen {
      padding: 40px 24px 32px;
      gap: 24px;
      align-items: center;
      justify-content: center;
      min-height: 100%;
    }

    .brand-mark {
      text-align: center;
    }
    .brand-mark h1 {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }
    .brand-mark h1 span { color: var(--rose); }
    .brand-mark p {
      color: var(--muted);
      font-size: 14px;
      margin-top: 6px;
    }

    /* ─────────────────────────────────────
       SCREEN 2 — Search
    ───────────────────────────────────── */
    .search-screen {
      padding: 24px 20px;
      gap: 16px;
    }

    .search-label {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .search-wrap {
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      color: var(--muted);
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 18px;
      font-weight: 500;
      padding: 18px 18px 18px 50px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--gold); }
    .search-input::placeholder { color: var(--muted); }

    .suggestions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
      overflow-y: auto;
    }

    .suggestion-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      transition: border-color 0.15s, background 0.15s;
      -webkit-user-select: none;
      user-select: none;
    }
    .suggestion-card:active {
      background: var(--surface2);
      border-color: var(--gold);
    }

    .suggestion-name {
      font-size: 17px;
      font-weight: 600;
      font-family: 'Syne', sans-serif;
    }
    .suggestion-formule {
      font-size: 13px;
      color: var(--muted);
      margin-top: 3px;
    }
    .suggestion-restant {
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .suggestion-restant.owed { color: var(--red); }
    .suggestion-restant.ok { color: var(--green); }

    .search-empty {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted);
      font-size: 15px;
    }
    .search-empty strong {
      display: block;
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    /* ─────────────────────────────────────
       SCREEN 3 — Fiche élève
    ───────────────────────────────────── */
    .fiche-screen {
      padding: 24px 20px 32px;
      gap: 20px;
      overflow-y: auto;
    }

    .student-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px 22px;
    }
    .student-card-name {
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }
    .student-card-formule {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .finance-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }
    .finance-item {
      text-align: center;
    }
    .finance-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .finance-value {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 700;
    }
    .finance-value.due { color: var(--amber); }
    .finance-value.paid { color: var(--green); }
    .finance-value.owed { color: var(--red); }
    .finance-value.clear { color: var(--green); }

    .entries-section h3 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .entry-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .entry-row:last-child { border-bottom: none; }
    .entry-date { font-size: 13px; color: var(--muted); white-space: nowrap; }
    .entry-method {
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--surface2);
      color: var(--muted);
      font-weight: 500;
      text-transform: capitalize;
    }
    .entry-amount {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--green);
      white-space: nowrap;
    }
    .entries-empty {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      padding: 16px 0;
    }

    /* ─────────────────────────────────────
       SCREEN 4 — Saisie
    ───────────────────────────────────── */
    .saisie-screen {
      padding: 24px 20px 32px;
      gap: 20px;
      overflow-y: auto;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .form-label {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .amount-input-wrap {
      position: relative;
    }
    .amount-currency {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--muted);
      pointer-events: none;
    }
    .amount-input {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 700;
      padding: 20px 20px 20px 50px;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
      appearance: none;
      inputmode: numeric;
    }
    .amount-input:focus { border-color: var(--gold); }
    .amount-input::placeholder { color: var(--muted2); }

    .method-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .method-btn {
      padding: 16px 12px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      text-align: center;
    }
    .method-btn:active { background: var(--surface2); }
    .method-btn.selected {
      border-color: var(--gold);
      background: var(--gold-dim);
      color: var(--gold);
    }

    .date-input {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 18px;
      font-weight: 500;
      padding: 18px;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
    }
    .date-input:focus { border-color: var(--gold); }
    .date-input::-webkit-calendar-picker-indicator {
      filter: invert(1);
      cursor: pointer;
      width: 24px;
      height: 24px;
    }

    .notes-input {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      padding: 16px 18px;
      outline: none;
      resize: none;
      transition: border-color 0.2s;
      min-height: 80px;
    }
    .notes-input:focus { border-color: var(--gold); }
    .notes-input::placeholder { color: var(--muted); }

    /* ─────────────────────────────────────
       SCREEN 5 — Confirmation
    ───────────────────────────────────── */
    .confirm-screen {
      padding: 40px 24px 40px;
      gap: 24px;
      align-items: center;
      justify-content: center;
      min-height: 100%;
    }

    .confirm-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--green-dim);
      border: 2px solid var(--green);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .confirm-icon svg { width: 36px; height: 36px; color: var(--green); }

    .confirm-recap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px 22px;
      width: 100%;
      max-width: 400px;
    }
    .confirm-recap-name {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 16px;
      text-align: center;
    }
    .confirm-recap-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 15px;
    }
    .confirm-recap-row:last-child { border-bottom: none; }
    .confirm-recap-key { color: var(--muted); }
    .confirm-recap-val { font-weight: 600; }
    .confirm-recap-amount {
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 800;
      color: var(--green);
      text-align: center;
      padding: 16px 0;
    }

    /* ─────────────────────────────────────
       Shared buttons
    ───────────────────────────────────── */
    .btn-primary {
      width: 100%;
      padding: 20px;
      border-radius: 16px;
      background: var(--rose);
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .btn-primary:active { transform: scale(0.98); background: #b0434b; }
    .btn-primary:disabled { background: var(--muted2); cursor: not-allowed; transform: none; }

    .btn-confirm {
      background: var(--green);
      color: var(--ink);
    }
    .btn-confirm:active { background: #22c55e; }

    .btn-ghost {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-ghost:active { border-color: var(--gold); color: var(--gold); }

    /* ─────────────────────────────────────
       Login form
    ───────────────────────────────────── */
    .auth-card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .auth-card label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .auth-input {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      padding: 14px 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    .auth-input:focus { border-color: var(--rose); }

    .error-msg {
      color: var(--red);
      font-size: 14px;
      text-align: center;
      min-height: 20px;
    }

    /* ─────────────────────────────────────
       Loading spinner
    ───────────────────────────────────── */
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─────────────────────────────────────
       Toast
    ───────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 22px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      z-index: 999;
      opacity: 0;
      transition: transform 0.3s ease, opacity 0.3s ease;
      white-space: nowrap;
      pointer-events: none;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    .toast.success { border-color: var(--green); color: var(--green); }
    .toast.error { border-color: var(--red); color: var(--red); }

    /* Sticky bottom button area */
    .bottom-action {
      padding: 16px 20px 32px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: var(--bg);
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div class="header" id="header">
    <button class="back-btn" id="backBtn" style="display:none" aria-label="Retour">
      <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    </button>
    <div class="header-title" id="headerTitle">
      Encaissement
      <span class="sub" id="headerSub">L'Académie</span>
    </div>
    <div class="encaissement-badge">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      PWA
    </div>
  </div>

  <!-- Step indicator (hidden on login) -->
  <div class="steps" id="stepIndicator" style="display:none">
    <div class="step-dot" id="dot1"></div>
    <div class="step-dot" id="dot2"></div>
    <div class="step-dot" id="dot3"></div>
    <div class="step-dot" id="dot4"></div>
  </div>

  <!-- Body -->
  <div class="body">

    <!-- ① Login Screen -->
    <div class="screen active login-screen" id="screenLogin">
      <div class="brand-mark">
        <h1>L'Académ<span>ie</span></h1>
        <p>Encaissement — Directrice</p>
      </div>
      <div class="auth-card">
        <div>
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" class="auth-input" placeholder="directrice@academie.fr" autocomplete="email">
        </div>
        <div>
          <label for="loginPassword">Mot de passe</label>
          <input type="password" id="loginPassword" class="auth-input" placeholder="••••••••" autocomplete="current-password">
        </div>
        <div class="error-msg" id="loginError"></div>
        <button class="btn-primary" id="loginBtn" onclick="doLogin()">Connexion</button>
      </div>
    </div>

    <!-- ② Search Screen -->
    <div class="screen search-screen" id="screenSearch">
      <span class="search-label">Rechercher un élève</span>
      <div class="search-wrap">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="M21 21l-4.35-4.35"/>
        </svg>
        <input type="search" id="searchInput" class="search-input" placeholder="Nom ou prénom…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="search">
      </div>
      <div class="suggestions" id="suggestions">
        <div class="search-empty">
          <strong>Commencez à taper</strong>
          Minimum 2 caractères
        </div>
      </div>
    </div>

    <!-- ③ Fiche Screen -->
    <div class="screen fiche-screen" id="screenFiche">
      <!-- Populated by JS -->
    </div>

    <!-- ④ Saisie Screen -->
    <div class="screen saisie-screen" id="screenSaisie">
      <div class="form-group">
        <label class="form-label">Montant</label>
        <div class="amount-input-wrap">
          <span class="amount-currency">€</span>
          <input type="number" id="amountInput" class="amount-input" placeholder="0" min="1" step="1" inputmode="numeric">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Mode de paiement</label>
        <div class="method-grid" id="methodGrid">
          <button class="method-btn selected" data-method="espèces" onclick="selectMethod(this)">Espèces</button>
          <button class="method-btn" data-method="chèque" onclick="selectMethod(this)">Chèque</button>
          <button class="method-btn" data-method="virement" onclick="selectMethod(this)">Virement</button>
          <button class="method-btn" data-method="CB" onclick="selectMethod(this)">Carte bancaire</button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="dateInput">Date</label>
        <input type="date" id="dateInput" class="date-input">
      </div>

      <div class="form-group">
        <label class="form-label" for="notesInput">Notes (optionnel)</label>
        <textarea id="notesInput" class="notes-input" placeholder="Remarque…" rows="2"></textarea>
      </div>
    </div>

    <!-- ⑤ Confirmation Screen -->
    <div class="screen confirm-screen" id="screenConfirm">
      <div class="confirm-icon">
        <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
      </div>
      <div class="confirm-recap" id="confirmRecap">
        <!-- Populated by JS -->
      </div>
    </div>

  </div><!-- /.body -->

  <!-- Bottom action (outside .body so it stays fixed at bottom) -->
  <div class="bottom-action" id="bottomAction" style="display:none"></div>
</div><!-- /#app -->

<div class="toast" id="toast"></div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
const STATE = {
  token: localStorage.getItem('encaissement_token') || null,
  user: null,
  currentStudent: null,   // { id, first_name, last_name, formule_label, montant_du_cents, amount_paid_cents, recent_entries }
  saisie: {               // draft entry
    amountCents: 0,
    method: 'espèces',
    date: todayISO(),
    notes: '',
  },
};

function todayISO() {
  return new Date().toFullYear ? new Date().toISOString().slice(0,10) : new Date().toISOString().slice(0,10);
}

// ─── Navigation ───────────────────────────────────────────────────────────────
const SCREENS = ['screenLogin', 'screenSearch', 'screenFiche', 'screenSaisie', 'screenConfirm'];
let currentScreen = 0;

function showScreen(idx) {
  SCREENS.forEach((id, i) => {
    document.getElementById(id).classList.toggle('active', i === idx);
  });
  currentScreen = idx;
  updateHeader(idx);
  updateSteps(idx);
  updateBottomAction(idx);
}

function updateHeader(idx) {
  const backBtn = document.getElementById('backBtn');
  const headerTitle = document.getElementById('headerTitle');
  const headerSub = document.getElementById('headerSub');

  if (idx === 0) {
    backBtn.style.display = 'none';
    headerTitle.childNodes[0].textContent = 'Encaissement';
    headerSub.textContent = 'L\'Académie';
    document.getElementById('stepIndicator').style.display = 'none';
    return;
  }

  document.getElementById('stepIndicator').style.display = 'flex';
  backBtn.style.display = (idx > 1) ? 'flex' : 'none';

  const titles = [
    '',
    'Recherche',
    STATE.currentStudent ? `${STATE.currentStudent.first_name} ${STATE.currentStudent.last_name}` : 'Fiche élève',
    'Saisir un paiement',
    'Confirmation',
  ];
  const subs = ['', 'Saison active', STATE.currentStudent?.formule_label || '', '', ''];
  headerTitle.childNodes[0].textContent = titles[idx];
  headerSub.textContent = subs[idx];
}

function updateSteps(idx) {
  if (idx === 0) return;
  const stepIdx = idx - 1; // steps 0–3 map to screens 1–4
  ['dot1','dot2','dot3','dot4'].forEach((id, i) => {
    const el = document.getElementById(id);
    el.classList.remove('active', 'done');
    if (i < stepIdx) el.classList.add('done');
    else if (i === stepIdx) el.classList.add('active');
  });
}

function updateBottomAction(idx) {
  const el = document.getElementById('bottomAction');
  if (idx === 0 || idx === 1) { el.style.display = 'none'; return; }

  el.style.display = 'flex';
  if (idx === 2) {
    el.innerHTML = `<button class="btn-primary" onclick="goToSaisie()">
      <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" style="width:20px;height:20px"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
      Saisir un paiement
    </button>`;
  } else if (idx === 3) {
    el.innerHTML = `<button class="btn-primary" id="validateBtn" onclick="goToConfirm()">
      Valider →
    </button>`;
  } else if (idx === 4) {
    el.innerHTML = `
      <button class="btn-primary btn-confirm" id="confirmBtn" onclick="submitPayment()">
        <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" style="width:20px;height:20px"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
        Confirmer
      </button>
      <button class="btn-ghost" onclick="goBack()">Modifier</button>`;
  }
}

function goBack() {
  if (currentScreen <= 1) return;
  showScreen(currentScreen - 1);
}

document.getElementById('backBtn').addEventListener('click', goBack);

// ─── Auth ─────────────────────────────────────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');

  errEl.textContent = '';
  if (!email || !password) { errEl.textContent = 'Email et mot de passe requis'; return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  try {
    // Step 1: get 2FA code
    const r1 = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const d1 = await r1.json();
    if (!r1.ok) {
      errEl.textContent = d1.error || 'Connexion échouée';
      btn.disabled = false;
      btn.textContent = 'Connexion';
      return;
    }

    // Prompt for 2FA code inline
    const code = prompt(`Code envoyé à ${d1.email} — entrez le code de vérification :`);
    if (!code) {
      btn.disabled = false;
      btn.textContent = 'Connexion';
      return;
    }

    const r2 = await fetch('/auth/verify-2fa', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pending_token: d1.pending_token, code: code.trim() }),
    });
    const d2 = await r2.json();
    if (!r2.ok) {
      errEl.textContent = d2.error || 'Code incorrect';
      btn.disabled = false;
      btn.textContent = 'Connexion';
      return;
    }

    // Check role
    if (!['DIRECTRICE', 'PRÉSIDENT'].includes(d2.user?.role)) {
      errEl.textContent = 'Accès réservé à la Directrice et au Président.';
      btn.disabled = false;
      btn.textContent = 'Connexion';
      return;
    }

    STATE.token = d2.token;
    STATE.user = d2.user;
    localStorage.setItem('encaissement_token', d2.token);
    initSearchScreen();
    showScreen(1);
  } catch (e) {
    errEl.textContent = 'Erreur réseau — réessayez.';
    btn.disabled = false;
    btn.textContent = 'Connexion';
  }
}

// Allow Enter key on login form
document.getElementById('loginPassword').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('loginEmail').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('loginPassword').focus();
});

async function verifyToken() {
  if (!STATE.token) return false;
  try {
    const r = await fetch('/api/encaissement/search?q=_ping_', {
      headers: { 'Authorization': `Bearer ${STATE.token}` },
    });
    if (r.status === 401 || r.status === 403) {
      localStorage.removeItem('encaissement_token');
      STATE.token = null;
      return false;
    }
    return true;
  } catch { return false; }
}

// ─── Search ───────────────────────────────────────────────────────────────────
let searchTimeout = null;

function initSearchScreen() {
  const input = document.getElementById('searchInput');
  input.value = '';
  renderSuggestions([]);
  input.addEventListener('input', () => {
    clearTimeout(searchTimeout);
    const q = input.value.trim();
    if (q.length < 2) { renderSuggestions([]); return; }
    searchTimeout = setTimeout(() => searchStudents(q), 250);
  });
  // Auto-focus search input when showing search screen
}

async function searchStudents(q) {
  try {
    const r = await fetch(`/api/encaissement/search?q=${encodeURIComponent(q)}`, {
      headers: { 'Authorization': `Bearer ${STATE.token}` },
    });
    if (r.status === 401) { logout(); return; }
    const data = await r.json();
    renderSuggestions(data);
  } catch { /* ignore network errors in search */ }
}

function renderSuggestions(students) {
  const el = document.getElementById('suggestions');
  if (!students.length) {
    const q = document.getElementById('searchInput').value.trim();
    if (q.length < 2) {
      el.innerHTML = `<div class="search-empty"><strong>Commencez à taper</strong>Minimum 2 caractères</div>`;
    } else {
      el.innerHTML = `<div class="search-empty"><strong>Aucun résultat</strong>Aucun élève trouvé pour « ${escHtml(q)} »</div>`;
    }
    return;
  }

  el.innerHTML = students.map(s => {
    const restant = Math.max(0, (s.montant_du_cents || 0) - (s.amount_paid_cents || 0));
    const restantClass = restant > 0 ? 'owed' : 'ok';
    const restantLabel = restant > 0 ? `−${fmtEur(restant)}` : '✓ À jour';
    return `<div class="suggestion-card" onclick="loadStudent(${s.id})">
      <div>
        <div class="suggestion-name">${escHtml(s.last_name)} ${escHtml(s.first_name)}</div>
        <div class="suggestion-formule">${escHtml(s.formule_label || '—')}</div>
      </div>
      <div class="suggestion-restant ${restantClass}">${restantLabel}</div>
    </div>`;
  }).join('');
}

// ─── Fiche ────────────────────────────────────────────────────────────────────
async function loadStudent(id) {
  try {
    const r = await fetch(`/api/encaissement/students/${id}`, {
      headers: { 'Authorization': `Bearer ${STATE.token}` },
    });
    if (r.status === 401) { logout(); return; }
    const student = await r.json();
    STATE.currentStudent = student;
    renderFiche(student);
    showScreen(2);
    // Pre-fill today's date in saisie
    document.getElementById('dateInput').value = todayISO();
  } catch (e) {
    showToast('Erreur lors du chargement', 'error');
  }
}

function renderFiche(s) {
  const montantDu = s.montant_du_cents || 0;
  const paid = s.amount_paid_cents || 0;
  const restant = Math.max(0, montantDu - paid);

  const entriesHtml = s.recent_entries && s.recent_entries.length
    ? s.recent_entries.map(e => `
        <div class="entry-row">
          <span class="entry-date">${fmtDate(e.payment_date)}</span>
          <span class="entry-method">${escHtml(e.payment_method)}</span>
          <span class="entry-amount">+${fmtEur(e.amount_cents)}</span>
        </div>`).join('')
    : `<div class="entries-empty">Aucun paiement enregistré</div>`;

  document.getElementById('screenFiche').innerHTML = `
    <div class="student-card">
      <div class="student-card-name">${escHtml(s.last_name)} ${escHtml(s.first_name)}</div>
      <div class="student-card-formule">${escHtml(s.formule_label || '—')}</div>
      <div class="finance-grid">
        <div class="finance-item">
          <div class="finance-label">Montant dû</div>
          <div class="finance-value due">${fmtEur(montantDu)}</div>
        </div>
        <div class="finance-item">
          <div class="finance-label">Payé</div>
          <div class="finance-value paid">${fmtEur(paid)}</div>
        </div>
        <div class="finance-item">
          <div class="finance-label">Restant</div>
          <div class="finance-value ${restant > 0 ? 'owed' : 'clear'}">${restant > 0 ? fmtEur(restant) : '✓'}</div>
        </div>
      </div>
    </div>
    <div class="entries-section">
      <h3>Derniers paiements</h3>
      ${entriesHtml}
    </div>
  `;
}

// ─── Saisie ───────────────────────────────────────────────────────────────────
function goToSaisie() {
  // Reset to defaults but preserve date
  document.getElementById('amountInput').value = '';
  // Reset method selection
  document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('selected'));
  document.querySelector('[data-method="espèces"]').classList.add('selected');
  STATE.saisie.method = 'espèces';
  STATE.saisie.notes = '';
  document.getElementById('notesInput').value = '';
  document.getElementById('dateInput').value = todayISO();

  showScreen(3);

  // Focus amount input after transition
  setTimeout(() => document.getElementById('amountInput').focus(), 100);
}

function selectMethod(btn) {
  document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  STATE.saisie.method = btn.dataset.method;
}

function goToConfirm() {
  const amountRaw = document.getElementById('amountInput').value;
  const amountEuros = parseFloat(amountRaw);

  if (!amountRaw || isNaN(amountEuros) || amountEuros <= 0) {
    showToast('Montant invalide', 'error');
    document.getElementById('amountInput').focus();
    return;
  }

  STATE.saisie.amountCents = Math.round(amountEuros * 100);
  STATE.saisie.date = document.getElementById('dateInput').value || todayISO();
  STATE.saisie.notes = document.getElementById('notesInput').value.trim();

  renderConfirm();
  showScreen(4);
}

// ─── Confirmation ─────────────────────────────────────────────────────────────
function renderConfirm() {
  const s = STATE.currentStudent;
  const saisie = STATE.saisie;
  const methodLabels = { espèces: 'Espèces', chèque: 'Chèque', virement: 'Virement', CB: 'Carte bancaire', prélèvement: 'Prélèvement' };

  document.getElementById('confirmRecap').innerHTML = `
    <div class="confirm-recap-name">${escHtml(s.last_name)} ${escHtml(s.first_name)}</div>
    <div class="confirm-recap-amount">${fmtEur(saisie.amountCents)}</div>
    <div class="confirm-recap-row">
      <span class="confirm-recap-key">Mode</span>
      <span class="confirm-recap-val">${escHtml(methodLabels[saisie.method] || saisie.method)}</span>
    </div>
    <div class="confirm-recap-row">
      <span class="confirm-recap-key">Date</span>
      <span class="confirm-recap-val">${fmtDate(saisie.date)}</span>
    </div>
    ${saisie.notes ? `<div class="confirm-recap-row">
      <span class="confirm-recap-key">Note</span>
      <span class="confirm-recap-val">${escHtml(saisie.notes)}</span>
    </div>` : ''}
  `;
}

async function submitPayment() {
  const btn = document.getElementById('confirmBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  try {
    const r = await fetch(`/api/encaissement/students/${STATE.currentStudent.id}/entries`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${STATE.token}`,
      },
      body: JSON.stringify({
        amount_cents: STATE.saisie.amountCents,
        payment_date: STATE.saisie.date,
        payment_method: STATE.saisie.method,
        notes: STATE.saisie.notes || undefined,
      }),
    });

    if (r.status === 401) { logout(); return; }
    const data = await r.json();

    if (!r.ok) {
      showToast(data.error || 'Erreur serveur', 'error');
      btn.disabled = false;
      btn.innerHTML = `<svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" style="width:20px;height:20px"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg> Confirmer`;
      return;
    }

    showToast('Paiement enregistré ✓', 'success');

    // Reset to search screen after short delay
    setTimeout(() => {
      STATE.currentStudent = null;
      STATE.saisie = { amountCents: 0, method: 'espèces', date: todayISO(), notes: '' };
      document.getElementById('searchInput').value = '';
      renderSuggestions([]);
      showScreen(1);
      // Re-focus search
      setTimeout(() => document.getElementById('searchInput').focus(), 100);
    }, 1200);

  } catch (e) {
    showToast('Erreur réseau', 'error');
    btn.disabled = false;
    btn.innerHTML = `<svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" style="width:20px;height:20px"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg> Confirmer`;
  }
}

// ─── Logout ───────────────────────────────────────────────────────────────────
function logout() {
  localStorage.removeItem('encaissement_token');
  STATE.token = null;
  STATE.user = null;
  showScreen(0);
}

// ─── Utils ────────────────────────────────────────────────────────────────────
function fmtEur(cents) {
  if (cents == null) return '—';
  return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(cents / 100);
}

function fmtDate(d) {
  if (!d) return '—';
  const [y, m, day] = String(d).slice(0, 10).split('-');
  return `${day}/${m}/${y}`;
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type}`;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
(async function init() {
  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw-encaissement.js').catch(() => {});
  }

  if (STATE.token) {
    const valid = await verifyToken();
    if (valid) {
      initSearchScreen();
      showScreen(1);
      setTimeout(() => document.getElementById('searchInput').focus(), 200);
      return;
    }
  }
  showScreen(0);
})();
</script>
</body>
</html>
